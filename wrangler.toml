name = "ai-media-team"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workflows
[[workflows]]
name = "content-workflow"
binding = "CONTENT_WORKFLOW"
class_name = "ContentWorkflow"

# Workers KV for caching
[[kv_namespaces]]
binding = "CACHE"
id = "8f2d43da6b7c4bffb4fb83649e385690"

# Observability for debugging
[observability]
enabled = true
head_sampling_rate = 1

# Env vars (set via wrangler secret)
# MINIMAX_API_KEY
# DISCORD_BOT_TOKEN
# DISCORD_APP_ID
# DISCORD_PUBLIC_KEY
# GITHUB_TOKEN
# GITHUB_REPO
# EXA_API_KEY
# DISCORD_CHANNEL_ID
